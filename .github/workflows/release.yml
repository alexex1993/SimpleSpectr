name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write   # нужно, чтобы приложить артефакты к релизу

jobs:
  build-and-upload:
    name: Build Release .dmg and attach to GitHub Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        run: |
          # Тег вида v2.3.2 -> версия 2.3.2 (убираем ведущую 'v')
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DMG_NAME=SimpleSpectr-${VERSION}-macos.dmg" >> "$GITHUB_ENV"

      - name: Build Release
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
          xcodebuild \
            -project SimpleSpectr.xcodeproj \
            -scheme SimpleSpectr \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            clean build | xcpretty && exit ${PIPESTATUS[0]}

      - name: Ad-hoc sign the app
        run: |
          APP_PATH="build/Build/Products/Release/SimpleSpectr.app"
          # Сборка идёт с CODE_SIGNING_ALLOWED=NO, поэтому .app выходит вообще
          # без подписи. На Apple Silicon macOS отказывается запускать
          # неподписанный бандл и показывает «приложение повреждено».
          # Здесь воспроизводим ровно то, что делал Xcode при локальной сборке
          # с макбука: ad-hoc подпись с реальным identifier и entitlements
          # (sandbox / микрофон / доступ к файлам).

          # 1) Убираем расширенные атрибуты — иначе codesign падает с
          #    «resource fork, Finder information, or similar detritus not allowed».
          xattr -cr "$APP_PATH"

          # 2) Ad-hoc подпись (--sign -) с entitlements и оригинальным identifier.
          codesign --force --deep --sign - \
            --identifier Alexex.SimpleSpectr \
            --entitlements SimpleSpectr.entitlements \
            "$APP_PATH"

          # 3) Проверяем, что подпись валидна и entitlements на месте.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --entitlements - "$APP_PATH"

      - name: Make .dmg
        run: |
          APP_PATH="build/Build/Products/Release/SimpleSpectr.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          # Точная копия оригинала: том "SimpleSpectr", формат UDBZ (bzip2), без кастомной раскладки окна
          hdiutil create \
            -volname "SimpleSpectr" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDBZ \
            "$DMG_NAME"
          test -f "$DMG_NAME" || { echo "DMG не создан"; exit 1; }

      - name: Attach .dmg to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$DMG_NAME" --clobber
