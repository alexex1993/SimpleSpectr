name: Deploy web

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy-web.yml'
  # Позволяет запустить деплой вручную из вкладки Actions.
  workflow_dispatch:

# Не даём двум деплоям сайта идти одновременно: новый push отменяет предыдущий.
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy web/ to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers (Static Assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # По умолчанию экшен ставит wrangler 3.90.0, где ассеты-only Worker
          # (конфиг с assets, без main) ещё не поддерживается → Missing entry-point.
          # Закрепляем версию 4.x, которая умеет Static Assets.
          wranglerVersion: "4.112.0"
          # Деплоим статику web/ в существующий Worker "simplespectr".
          # Конфиг — wrangler.jsonc в корне репозитория (assets.directory = ./web).
          command: deploy
